<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <title>Login Page</title>
</head>
<body>
    <main>
        <div class="container">
            <form class="container-sgp" method="post" autocomplete="on">
                <h1>Login</h1>
                <input type="email" placeholder="username@email.com">
                <input type="password" placeholder="senha" autocomplete="current-password" required minlength="8">
                <a href="#">
                    <p>Esqueceu sua senha?</p>
                </a>
                <button type="submit">Continuar</button>
            </form>
            <div class="container-bgd">
                <h1>Welcome back!</h1>
                <p>Register with your email to acess our site!</p>
            </div>
        </div>
    </main>
</body>
</html>
