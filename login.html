<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <title>Login Page</title>
</head>
<body>
    <main>
        <div class="container">
            <form class="container-sgp" method="post" autocomplete="on">
                <h1>Login</h1>
                <input type="email" placeholder="username@email.com">
                <input type="password" placeholder="senha" autocomplete="current-password" required minlength="8">
                <a href="#">Esqueceu sua senha?</a>
                <button type="submit">Continuar</button>
                <p>Ou acesse diretamente usando:</p>
                <div class="social-icons">
                    <a href="#" class="icon"><img src="Imagens/google-circle.png" alt="google"></a>
                    <a href="#" class="icon"><img src="Imagens/facebook.png" alt="facebook"></a>
                    <a href="#" class="icon"><img src="Imagens/github.png" alt="github"></a>
                    <a href="#" class="icon"><img src="Imagens/linkedin-circle.png" alt=""></a>
                </div>
            </form>
            <div class="container-bgd">
                <h1>Welcome back!</h1>
                <p>Register with your email to acess our site!</p>
            </div>
        </div>
    </main>
</body>
</html>
